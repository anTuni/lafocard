<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f5f3ef">
<title>라포카드 · 이야기를 여는 질문</title>
<style>
:root{
  --bg:#f5f3ef; --panel:#fff; --ink:#2b2b2f; --muted:#8a8a93; --line:#ececE4;
  --radius:20px; --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",system-ui,-apple-system,sans-serif;
  background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}

.app{max-width:600px;margin:0 auto;padding:16px 16px calc(28px + var(--safe-b));}
header.top{display:flex;align-items:center;justify-content:space-between;padding:8px 2px 14px;}
.brand h1{font-size:22px;margin:0;font-weight:800;letter-spacing:-.5px;}
.brand .tag{font-size:12px;color:var(--muted);margin-top:2px;}
.icon-btn{width:44px;height:44px;border-radius:14px;background:var(--panel);
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 2px 8px rgba(30,25,20,.07);position:relative;transition:transform .12s;}
.icon-btn:active{transform:scale(.9);}
.icon-btn .badge{position:absolute;top:-5px;right:-5px;background:#e85d5d;color:#fff;
  font-size:10px;min-width:18px;height:18px;border-radius:9px;padding:0 4px;font-weight:700;
  display:flex;align-items:center;justify-content:center;}

.hero{border-radius:var(--radius);padding:20px;margin-bottom:18px;color:#fff;
  background:linear-gradient(135deg,#2b2b2f,#454049);box-shadow:0 10px 26px rgba(30,25,20,.16);
  display:flex;align-items:center;justify-content:space-between;gap:14px;}
.hero h2{margin:0 0 3px;font-size:17px;font-weight:800;}
.hero p{margin:0;font-size:12.5px;color:#d8d5db;line-height:1.5;}
.hero button{background:#fff;color:#2b2b2f;font-weight:800;font-size:15px;padding:13px 22px;
  border-radius:14px;white-space:nowrap;transition:transform .12s;}
.hero button:active{transform:scale(.93);}

.sec{display:flex;align-items:baseline;justify-content:space-between;margin:4px 4px 12px;}
.sec h3{margin:0;font-size:15px;font-weight:800;}
.sec span{font-size:12px;color:var(--muted);}

.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.cat{border-radius:18px;overflow:hidden;box-shadow:0 5px 16px rgba(30,25,20,.10);
  color:#fff;display:flex;flex-direction:column;min-height:150px;position:relative;}
.cat .body{flex:1;padding:16px 16px 12px;display:flex;flex-direction:column;gap:6px;cursor:pointer;
  transition:transform .12s;}
.cat .body:active{transform:scale(.97);}
.cat .icon{font-size:26px;line-height:1;}
.cat .ko{font-size:22px;font-weight:800;letter-spacing:-.5px;}
.cat .en{font-size:10px;letter-spacing:1.5px;opacity:.8;font-weight:700;}
.cat .cnt{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.22);font-size:11px;
  font-weight:700;padding:3px 9px;border-radius:20px;}
.cat .browse{border:none;background:rgba(255,255,255,.16);color:#fff;font-weight:800;
  font-size:12.5px;padding:11px 0;transition:background .12s;}
.cat .browse:active{background:rgba(255,255,255,.28);}

/* ---- card face (text) ---- */
.card-face{background:#fff;border-radius:16px;position:relative;color:var(--ink);
  display:flex;flex-direction:column;align-items:center;text-align:center;
  padding:26px 20px 22px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.04);}
.card-face .cf-en{font-size:10px;letter-spacing:2px;font-weight:700;margin-bottom:2px;}
.card-face .cf-ko{font-size:17px;font-weight:800;margin-bottom:auto;}
.card-face .cf-q{font-weight:600;line-height:1.55;white-space:pre-line;
  padding:22px 4px;flex:1;display:flex;align-items:center;justify-content:center;
  word-break:keep-all;}
.card-face .cf-line{width:62%;height:1px;background:#d9d6cf;margin:6px 0 12px;}
.card-face .cf-brand{font-size:10px;color:#b7b3ab;letter-spacing:.3px;}

/* ---- draw overlay (fullscreen on mobile) ---- */
.overlay{position:fixed;inset:0;z-index:60;display:none;flex-direction:column;
  align-items:center;justify-content:center;padding:20px;animation:fade .2s;}
.overlay.show{display:flex;}
@keyframes fade{from{opacity:0}to{opacity:1}}
.draw-card{width:100%;max-width:360px;border-radius:26px;padding:16px;
  box-shadow:0 24px 60px rgba(0,0,0,.4);animation:pop .34s cubic-bezier(.2,.9,.3,1.25);}
.draw-card.flip{animation:flip .5s ease;}
@keyframes pop{from{opacity:0;transform:translateY(16px) scale(.9)}to{opacity:1;transform:none}}
@keyframes flip{0%{transform:perspective(900px) rotateY(88deg);opacity:.2}
  100%{transform:perspective(900px) rotateY(0);opacity:1}}
.draw-card .card-face{border-radius:16px;min-height:62vh;}
.draw-card .cf-q{font-size:clamp(21px,6vw,27px);}
.modal-actions{display:flex;gap:10px;width:100%;max-width:360px;margin-top:16px;}
.modal-actions button{flex:1;padding:15px 0;border-radius:15px;font-size:14px;font-weight:800;
  background:rgba(255,255,255,.16);color:#fff;transition:transform .1s,background .12s;
  display:flex;align-items:center;justify-content:center;gap:5px;}
.modal-actions button:active{transform:scale(.94);}
.modal-actions .primary{background:#fff;color:#2b2b2f;}
.modal-actions .fav.on{background:#fff;color:#e85d5d;}
.close-x{position:absolute;top:calc(14px + var(--safe-b));right:16px;color:rgba(255,255,255,.85);
  font-size:26px;width:42px;height:42px;border-radius:50%;background:rgba(0,0,0,.18);
  display:flex;align-items:center;justify-content:center;z-index:2;}

/* ---- sheets (browse / library) ---- */
.sheet{position:fixed;inset:0;z-index:50;background:var(--bg);display:none;flex-direction:column;
  animation:slideUp .28s ease;}
.sheet.show{display:flex;}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:none;opacity:1}}
.sheet-head{display:flex;align-items:center;gap:12px;padding:calc(14px + env(safe-area-inset-top,0px)) 16px 14px;
  background:var(--panel);border-bottom:3px solid var(--line);}
.sheet-head .back{font-size:22px;width:40px;height:40px;border-radius:12px;background:var(--line);
  display:flex;align-items:center;justify-content:center;}
.sheet-head .stitle{font-size:16px;font-weight:800;line-height:1.2;}
.sheet-head .stitle small{display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin-top:2px;}
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;flex:1;}
.browse-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:600px;margin:0 auto;}
.mini{border-radius:14px;padding:8px;position:relative;color:#fff;transition:transform .12s;}
.mini:active{transform:scale(.96);}
.mini .mini-face{background:#fff;border-radius:9px;color:var(--ink);min-height:150px;
  padding:14px 10px;display:flex;flex-direction:column;text-align:center;}
.mini .mini-en{font-size:8px;letter-spacing:1.5px;font-weight:700;}
.mini .mini-ko{font-size:12px;font-weight:800;margin-bottom:6px;}
.mini .mini-q{font-size:12.5px;font-weight:600;line-height:1.45;flex:1;
  display:flex;align-items:center;justify-content:center;word-break:keep-all;white-space:pre-line;}
.mini .num{position:absolute;top:14px;left:14px;font-size:9px;font-weight:800;
  background:rgba(0,0,0,.28);padding:2px 6px;border-radius:8px;}
.mini .heart{position:absolute;top:12px;right:12px;font-size:14px;opacity:0;}
.mini.faved .heart{opacity:1;}

.lib-tabs{display:flex;gap:8px;padding:12px 16px 0;background:var(--panel);}
.lib-tabs button{flex:1;padding:11px 0;border-radius:12px;font-weight:800;font-size:13.5px;
  background:var(--line);color:var(--muted);}
.lib-tabs button.active{background:#2b2b2f;color:#fff;}
.lib-actions{display:flex;justify-content:flex-end;padding:10px 16px 0;max-width:600px;margin:0 auto;}
.lib-actions button{font-size:12px;color:var(--muted);text-decoration:underline;}
.empty{text-align:center;color:var(--muted);padding:56px 20px;font-size:14px;line-height:1.6;}
.empty .big{font-size:38px;margin-bottom:8px;}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">
      <h1>라포카드</h1>
      <div class="tag">한 장을 뽑아, 이야기를 열어요</div>
    </div>
    <button class="icon-btn" onclick="openLibrary('fav')" aria-label="보관함">
      <span>❤</span><span class="badge" id="favBadge" style="display:none">0</span>
    </button>
  </header>

  <div class="hero">
    <div>
      <h2>🎲 전체 랜덤 뽑기</h2>
      <p>모든 카테고리를 섞어<br>질문 한 장을 뽑아요</p>
    </div>
    <button onclick="drawRandom(null)">뽑기</button>
  </div>

  <div class="sec"><h3>카테고리</h3><span id="totalCount"></span></div>
  <div class="cat-grid" id="catGrid"></div>
</div>

<!-- Draw overlay -->
<div class="overlay" id="overlay">
  <div class="close-x" onclick="closeOverlay()">×</div>
  <div class="draw-card" id="drawCard"></div>
  <div class="modal-actions">
    <button class="fav" id="favBtn" onclick="toggleFav()">♡ 저장</button>
    <button class="primary" id="redrawBtn" onclick="redraw()">🔄 다시</button>
    <button onclick="closeOverlay()">닫기</button>
  </div>
</div>

<!-- Browse sheet -->
<div class="sheet" id="browseSheet">
  <div class="sheet-head" id="browseHead">
    <button class="back" onclick="closeBrowse()">‹</button>
    <div class="stitle" id="browseTitle">탐색<small id="browseSub"></small></div>
  </div>
  <div class="sheet-body"><div class="browse-grid" id="browseGrid"></div></div>
</div>

<!-- Library sheet -->
<div class="sheet" id="librarySheet">
  <div class="sheet-head">
    <button class="back" onclick="closeLibrary()">‹</button>
    <div class="stitle">보관함<small>저장한 카드와 최근 기록</small></div>
  </div>
  <div class="lib-tabs">
    <button id="tabFav" class="active" onclick="switchLibTab('fav')">❤ 즐겨찾기</button>
    <button id="tabHist" onclick="switchLibTab('hist')">🕘 최근 기록</button>
  </div>
  <div class="lib-actions"><button id="clearBtn" onclick="clearCurrentLib()"></button></div>
  <div class="sheet-body"><div class="browse-grid" id="libGrid"></div></div>
</div>

/* storage */
const LS_FAV="lafocard_fav_v2", LS_HIST="lafocard_hist_v2";
function load(k){try{return JSON.parse(localStorage.getItem(k))||[]}catch(e){return[]}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
let favs=load(LS_FAV), hist=load(LS_HIST);
const cid=(c,i)=>c+"#"+i;
const isFav=(c,i)=>favs.some(f=>f.id===cid(c,i));

/* card face html */
function faceHTML(cat,i,cls){
  const c=CATS[cat];
  return `<div class="card-face" style="background:#fff">
    <div class="cf-en" style="color:${c.color}">${c.en}</div>
    <div class="cf-ko" style="color:${c.color}">${c.ko}</div>
    <div class="cf-q">${Q[cat][i]}</div>
    <div class="cf-line"></div>
    <div class="cf-brand">더불어 성장하는 이타주의자들</div>
  </div>`;
}

/* home */
function renderHome(){
  let total=0;
  document.getElementById("catGrid").innerHTML=Object.entries(CATS).map(([k,c])=>{
    const n=Q[k].length; total+=n;
    return `<div class="cat" style="background:${c.color}">
      <span class="cnt">${n}장</span>
      <div class="body" onclick="drawRandom('${k}')">
        <span class="icon">${c.icon}</span>
        <span class="ko">${c.ko}</span>
        <span class="en">${c.en}</span>
        <span style="font-size:11px;opacity:.85;margin-top:2px">눌러서 뽑기</span>
      </div>
      <button class="browse" onclick="openBrowse('${k}')">📖 질문 탐색</button>
    </div>`;
  }).join("");
  document.getElementById("totalCount").textContent="총 "+total+"장";
  updateBadge();
}
function updateBadge(){
  const b=document.getElementById("favBadge");
  if(favs.length){b.style.display="flex";b.textContent=favs.length;}else b.style.display="none";
}

/* draw */
let current=null;
function pick(cat){
  const key=cat||Object.keys(Q)[Math.floor(Math.random()*5)];
  return {cat:key,i:Math.floor(Math.random()*Q[key].length)};
}
function drawRandom(cat){ current=pick(cat); document.getElementById("redrawBtn").dataset.scope=cat||""; showCard(true); addHist(current);}
function redraw(){ const s=document.getElementById("redrawBtn").dataset.scope; current=pick(s||null); showCard(true); addHist(current);}
function showCard(flip){
  const {cat,i}=current, c=CATS[cat];
  const ov=document.getElementById("overlay");
  ov.style.background=c.color+"f2";
  const card=document.getElementById("drawCard");
  card.style.background=c.color;
  card.innerHTML=faceHTML(cat,i);
  const fav=document.getElementById("favBtn");
  if(isFav(cat,i)){fav.classList.add("on");fav.innerHTML="❤ 저장됨";}
  else{fav.classList.remove("on");fav.innerHTML="♡ 저장";}
  ov.classList.add("show");
  if(flip){card.classList.remove("flip");void card.offsetWidth;card.classList.add("flip");}
}
function closeOverlay(){document.getElementById("overlay").classList.remove("show");}

/* fav / hist */
function toggleFav(){
  const {cat,i}=current, id=cid(cat,i);
  if(isFav(cat,i))favs=favs.filter(f=>f.id!==id);
  else favs.unshift({id,cat,i,ts:Date.now()});
  save(LS_FAV,favs); showCard(false); updateBadge();
}
function addHist(x){
  const id=cid(x.cat,x.i);
  hist=hist.filter(h=>h.id!==id); hist.unshift({id,cat:x.cat,i:x.i,ts:Date.now()});
  if(hist.length>80)hist=hist.slice(0,80); save(LS_HIST,hist);
}

/* browse */
function openBrowse(cat){
  const c=CATS[cat];
  document.getElementById("browseTitle").firstChild.textContent=c.ko+" ";
  document.getElementById("browseSub").textContent=c.en+" · "+Q[cat].length+"개의 질문";
  document.getElementById("browseHead").style.borderBottomColor=c.color;
  document.getElementById("browseGrid").innerHTML=Q[cat].map((q,i)=>miniHTML(cat,i)).join("");
  document.getElementById("browseSheet").classList.add("show");
}
function miniHTML(cat,i){
  const c=CATS[cat];
  return `<div class="mini ${isFav(cat,i)?'faved':''}" style="background:${c.color}" onclick="openFromList('${cat}',${i})">
    <span class="num">${i+1}</span><span class="heart">❤</span>
    <div class="mini-face">
      <div class="mini-en" style="color:${c.color}">${c.en}</div>
      <div class="mini-ko" style="color:${c.color}">${c.ko}</div>
      <div class="mini-q">${Q[cat][i]}</div>
    </div>
  </div>`;
}
function openFromList(cat,i){ current={cat,i}; document.getElementById("redrawBtn").dataset.scope=cat; showCard(true); addHist(current);}
function closeBrowse(){document.getElementById("browseSheet").classList.remove("show");}

/* library */
let libTab="fav";
function openLibrary(t){switchLibTab(t||"fav");document.getElementById("librarySheet").classList.add("show");}
function closeLibrary(){document.getElementById("librarySheet").classList.remove("show");}
function switchLibTab(t){
  libTab=t;
  document.getElementById("tabFav").classList.toggle("active",t==="fav");
  document.getElementById("tabHist").classList.toggle("active",t==="hist");
  renderLib();
}
function renderLib(){
  const list=libTab==="fav"?favs:hist;
  const grid=document.getElementById("libGrid");
  document.getElementById("clearBtn").textContent=list.length?(libTab==="fav"?"즐겨찾기 비우기":"기록 지우기"):"";
  if(!list.length){
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1">
      <div class="big">${libTab==="fav"?"❤":"🕘"}</div>
      ${libTab==="fav"?"아직 저장한 카드가 없어요.<br>카드를 뽑고 ♡ 저장을 눌러보세요.":"최근에 뽑은 카드가 없어요."}</div>`;
    return;
  }
  grid.innerHTML=list.map(it=>miniHTML(it.cat,it.i)).join("");
}
function clearCurrentLib(){
  if(libTab==="fav"){if(!confirm("즐겨찾기를 모두 지울까요?"))return;favs=[];save(LS_FAV,favs);updateBadge();}
  else{if(!confirm("최근 기록을 모두 지울까요?"))return;hist=[];save(LS_HIST,hist);}
  renderLib();
}

renderHome();
</script>
